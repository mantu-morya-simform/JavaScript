<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search UI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f5;
      }

      .search__input {
        display: flex;
        gap: 8px;
      }

      .search__input input {
        padding: 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
        width: 220px;
      }

      .search__input input:focus {
        border-color: #667eea;
      }

      .search__input button {
        padding: 10px 15px;
        font-size: 14px;
        border: none;
        border-radius: 5px;
        background: #667eea;
        color: white;
        cursor: pointer;
      }

      .search__input button:hover {
        background: #5a67d8;
      }
    </style>
  </head>
  <body>
    <div class="search__input">
      <input class="search__input__ele" type="text" placeholder="Search..." />
      <button onclick="throttledSearch()">Search</button>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
